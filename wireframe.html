<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f4f3f1; --surface: #fff; --border: #d6d2cc; --ink: #1a1714;
    --muted: #7a7570; --mono: 'IBM Plex Mono', monospace;
    --status-none: #e8e5e0; --status-change: #fef3c7; --status-urgent: #fee2e2;
    --status-done: #dcfce7; --status-change-ink: #92400e; --status-urgent-ink: #991b1b;
    --status-done-ink: #166534; --accent: #8b6914; --drawer: 380px;
  }
  body { font-family: 'Jost', system-ui, sans-serif; background: var(--bg); color: var(--ink);
    display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  /* ── Top toolbar ── */
  #toolbar { background: var(--ink); color: #fff; padding: 10px 16px;
    display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #toolbar h1 { font-size: 13px; font-family: var(--mono); letter-spacing: .12em;
    text-transform: uppercase; white-space: nowrap; }
  #toolbar .sep { width: 1px; background: rgba(255,255,255,.2); height: 18px; }
  #export-btn { margin-left: auto; background: var(--accent); color: #fff; border: none;
    padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px;
    font-family: var(--mono); letter-spacing: .08em; white-space: nowrap; }
  #export-btn:hover { filter: brightness(1.15); }
  #note-count { font-size: 11px; font-family: var(--mono); color: rgba(255,255,255,.6); white-space: nowrap; }

  /* ── Page tabs ── */
  #tabs { background: #fff; border-bottom: 1px solid var(--border); display: flex;
    overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
  #tabs::-webkit-scrollbar { display: none; }
  .tab { padding: 10px 16px; font-size: 12px; font-family: var(--mono); cursor: pointer;
    white-space: nowrap; border-bottom: 2px solid transparent; color: var(--muted);
    user-select: none; position: relative; transition: color .15s; }
  .tab:hover { color: var(--ink); }
  .tab.active { color: var(--ink); border-bottom-color: var(--accent); }
  .tab .badge { display: inline-flex; align-items: center; justify-content: center;
    width: 16px; height: 16px; border-radius: 50%; font-size: 9px; margin-left: 6px;
    background: var(--accent); color: #fff; vertical-align: middle; }

  /* ── Main layout ── */
  #layout { display: flex; flex: 1; overflow: hidden; }

  /* ── Wireframe canvas ── */
  #canvas { flex: 1; overflow-y: auto; padding: 20px; display: flex;
    flex-direction: column; gap: 10px; }

  /* ── Section block ── */
  .wf-block { background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 14px 16px; cursor: pointer;
    transition: border-color .15s, box-shadow .15s; position: relative; }
  .wf-block:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(0,0,0,.08); }
  .wf-block.has-note { border-left: 4px solid; }
  .wf-block.status-change { border-left-color: #f59e0b; background: #fffdf5; }
  .wf-block.status-urgent { border-left-color: #ef4444; background: #fff8f8; }
  .wf-block.status-done   { border-left-color: #22c55e; background: #f8fff9; }
  .wf-block.shared { opacity: .72; }

  .block-header { display: flex; align-items: flex-start; gap: 10px; }
  .block-label { font-size: 13px; font-weight: 600; flex: 1; }
  .block-shared-tag { font-size: 9px; font-family: var(--mono); background: #e8e5e0;
    color: var(--muted); padding: 2px 6px; border-radius: 4px; letter-spacing: .08em;
    text-transform: uppercase; flex-shrink: 0; margin-top: 2px; }
  .block-status-tag { font-size: 9px; font-family: var(--mono); padding: 2px 7px;
    border-radius: 4px; letter-spacing: .06em; text-transform: uppercase;
    flex-shrink: 0; margin-top: 2px; }
  .status-tag-change { background: var(--status-change); color: var(--status-change-ink); }
  .status-tag-urgent { background: var(--status-urgent); color: var(--status-urgent-ink); }
  .status-tag-done   { background: var(--status-done);   color: var(--status-done-ink); }

  .block-preview { font-size: 11.5px; color: var(--muted); margin-top: 6px;
    line-height: 1.6; max-width: 72ch; }
  .block-note-preview { font-size: 11px; color: var(--accent); margin-top: 6px;
    font-style: italic; }

  .block-codes { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .code-badge { font-family: var(--mono); font-size: 10.5px; background: #f0ede8;
    border: 1px solid var(--border); border-radius: 4px; padding: 3px 8px;
    color: #4a3728; cursor: pointer; user-select: all; display: flex; align-items: center; gap: 5px; }
  .code-badge:hover { background: #e8e0d4; }
  .code-badge .copy-icon { font-size: 9px; opacity: .5; }
  .code-badge.copied { background: #dcfce7; border-color: #86efac; color: #166534; }

  /* ── Side drawer ── */
  #drawer { width: var(--drawer); background: var(--surface); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
    transition: width .2s ease; }
  #drawer.closed { width: 0; }
  #drawer-inner { width: var(--drawer); display: flex; flex-direction: column;
    height: 100%; overflow: hidden; }
  #drawer-header { padding: 14px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  #drawer-title { font-size: 12px; font-family: var(--mono); font-weight: 600;
    color: var(--ink); }
  #drawer-close { background: none; border: none; font-size: 18px; cursor: pointer;
    color: var(--muted); line-height: 1; padding: 0 2px; }
  #drawer-close:hover { color: var(--ink); }
  #drawer-body { padding: 16px; display: flex; flex-direction: column; gap: 12px;
    flex: 1; overflow-y: auto; }
  .drawer-field label { display: block; font-size: 11px; font-family: var(--mono);
    color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .08em; }
  .drawer-field .code-display { font-family: var(--mono); font-size: 11px;
    background: #f0ede8; padding: 6px 10px; border-radius: 6px; color: #4a3728;
    word-break: break-all; }
  .drawer-field select, .drawer-field textarea {
    width: 100%; border: 1.5px solid var(--border); border-radius: 6px;
    font-size: 13px; font-family: inherit; padding: 8px 10px; background: var(--bg);
    color: var(--ink); resize: vertical; }
  .drawer-field textarea { min-height: 100px; }
  .drawer-field select:focus, .drawer-field textarea:focus {
    outline: none; border-color: var(--accent); }
  #drawer-save { background: var(--ink); color: #fff; border: none; padding: 10px;
    border-radius: 8px; font-size: 13px; cursor: pointer; font-family: inherit; }
  #drawer-save:hover { background: var(--accent); }
  #drawer-delete { background: none; color: #dc2626; border: 1px solid #fca5a5;
    padding: 8px; border-radius: 8px; font-size: 12px; cursor: pointer;
    font-family: inherit; display: none; }
  #drawer-delete:hover { background: #fee2e2; }

  /* ── Export modal ── */
  #export-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
    z-index: 100; align-items: center; justify-content: center; }
  #export-modal.open { display: flex; }
  #export-box { background: #fff; border-radius: 12px; padding: 24px;
    width: min(640px, 90vw); max-height: 80vh; display: flex; flex-direction: column; gap: 12px; }
  #export-box h2 { font-size: 14px; font-family: var(--mono); }
  #export-text { flex: 1; overflow-y: auto; font-family: var(--mono); font-size: 11px;
    background: var(--bg); padding: 12px; border-radius: 8px; white-space: pre-wrap;
    max-height: 50vh; border: 1px solid var(--border); }
  #export-copy { background: var(--ink); color: #fff; border: none; padding: 10px 20px;
    border-radius: 8px; cursor: pointer; font-size: 13px; font-family: inherit; }
  #export-copy:hover { background: var(--accent); }
  #export-close-btn { background: none; border: 1px solid var(--border); padding: 10px 20px;
    border-radius: 8px; cursor: pointer; font-size: 13px; font-family: inherit; }
</style>

  </div>

  { id: 'thanks', label: 'Thanks', file: 'thanks.html', sections: [
    SHARED.utilityBar, SHARED.header,
    { label: 'Thank You', selector: 'section, main', path: 'thanks / content',
      preview: 'H1: "Thank you. Drew reads every message." · Confirmation message after form submission' },
    SHARED.footer,
  ]},
];

/* ─── STATE ─── */
const STORE_KEY = 'wallr-wf-v1';
let notes = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
let activePage = 0;
let activeBlock = null;

function saveNotes() { localStorage.setItem(STORE_KEY, JSON.stringify(notes)); }
function noteKey(pageId, path) { return pageId + '::' + path; }
function getNote(pageId, path) { return notes[noteKey(pageId, path)] || null; }

/* ─── RENDER TABS ─── */
function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  PAGES.forEach((page, i) => {
    const count = Object.keys(notes).filter(k => k.startsWith(page.id + '::') && notes[k].status !== 'none').length;
    const tab = document.createElement('div');
    tab.className = 'tab' + (i === activePage ? ' active' : '');
    tab.innerHTML = page.label + (count ? `<span class="badge">${count}</span>` : '');
    tab.addEventListener('click', () => { activePage = i; closeDrawer(); renderTabs(); renderCanvas(); });
    tabs.appendChild(tab);
  });
}

/* ─── RENDER CANVAS ─── */
function renderCanvas() {
  const canvas = document.getElementById('canvas');
  const page = PAGES[activePage];
  canvas.innerHTML = '';
  page.sections.forEach(sec => {
    const n = getNote(page.id, sec.path);
    const status = n ? n.status : 'none';
    const block = document.createElement('div');
    block.className = 'wf-block' + (n && status !== 'none' ? ' has-note status-' + status : '') + (sec.shared ? ' shared' : '');

    let statusTag = '';
    if (status === 'change') statusTag = '<span class="block-status-tag status-tag-change">Needs change</span>';
    if (status === 'urgent') statusTag = '<span class="block-status-tag status-tag-urgent">Urgent</span>';
    if (status === 'done')   statusTag = '<span class="block-status-tag status-tag-done">Done</span>';
    const sharedTag = sec.shared ? '<span class="block-shared-tag">Shared</span>' : '';

    block.innerHTML = `
      <div class="block-header">
        <span class="block-label">${sec.label}</span>
        ${sharedTag}${statusTag}
      </div>
      <div class="block-preview">${sec.preview}</div>
      ${n && n.note ? `<div class="block-note-preview">↳ ${n.note.substring(0,120)}${n.note.length > 120 ? '…' : ''}</div>` : ''}
      <div class="block-codes">
        <span class="code-badge" data-copy="${sec.path}" title="Click to copy plain English ID">
          <span class="copy-icon">⧉</span>${sec.path}
        </span>
        <span class="code-badge" data-copy="${sec.selector}" title="Click to copy HTML selector">
          <span class="copy-icon">⧉</span><code>${sec.selector}</code>
        </span>
      </div>`;

    block.querySelectorAll('.code-badge').forEach(badge => {
      badge.addEventListener('click', e => {
        e.stopPropagation();
        const text = badge.getAttribute('data-copy');
        navigator.clipboard.writeText(text).then(() => {
          badge.classList.add('copied');
          setTimeout(() => badge.classList.remove('copied'), 1200);
        }).catch(() => {});
      });
    });

    block.addEventListener('click', () => openDrawer(sec));
    canvas.appendChild(block);
  });
  updateNoteCount();
}

/* ─── DRAWER ─── */
function openDrawer(sec) {
  activeBlock = sec;
  document.getElementById('drawer-title').textContent = sec.label;
  document.getElementById('d-path').textContent = sec.path;
  document.getElementById('d-selector').textContent = sec.selector;
  const n = getNote(PAGES[activePage].id, sec.path);
  document.getElementById('d-status').value = n ? n.status : 'none';
  document.getElementById('d-note').value = n ? n.note : '';
  document.getElementById('drawer-delete').style.display = n ? 'block' : 'none';
  document.getElementById('drawer').classList.remove('closed');
}

function closeDrawer() {
  document.getElementById('drawer').classList.add('closed');
  activeBlock = null;
}

document.getElementById('drawer-close').addEventListener('click', closeDrawer);

document.getElementById('drawer-save').addEventListener('click', () => {
  if (!activeBlock) return;
  const key = noteKey(PAGES[activePage].id, activeBlock.path);
  const status = document.getElementById('d-status').value;
  const note = document.getElementById('d-note').value.trim();
  notes[key] = { status, note, path: activeBlock.path, selector: activeBlock.selector,
    label: activeBlock.label, page: PAGES[activePage].id, pageLabel: PAGES[activePage].label,
    updated: new Date().toISOString() };
  saveNotes();
  document.getElementById('drawer-delete').style.display = 'block';
  renderTabs(); renderCanvas();
});

document.getElementById('drawer-delete').addEventListener('click', () => {
  if (!activeBlock) return;
  delete notes[noteKey(PAGES[activePage].id, activeBlock.path)];
  saveNotes();
  closeDrawer();
  renderTabs(); renderCanvas();
});

/* ─── NOTE COUNT ─── */
function updateNoteCount() {
  const total = Object.values(notes).filter(n => n.status !== 'none').length;
  document.getElementById('note-count').textContent = total + ' annotation' + (total !== 1 ? 's' : '');
}

/* ─── EXPORT ─── */
document.getElementById('export-btn').addEventListener('click', () => {
  const all = Object.values(notes).filter(n => n.status !== 'none')
    .sort((a, b) => a.page.localeCompare(b.page) || a.path.localeCompare(b.path));
  if (!all.length) {
    document.getElementById('export-text').textContent = 'No annotations yet. Click a section block to add one.';
  } else {
    const statusLabel = { change: 'NEEDS CHANGE', urgent: 'URGENT', done: 'DONE' };
    let out = 'WALLR WIREFRAME ANNOTATIONS\n';
    out += 'Exported: ' + new Date().toLocaleString() + '\n';
    out += '─'.repeat(48) + '\n\n';
    all.forEach((n, i) => {
      out += `${i + 1}. ${n.pageLabel} — ${n.label} [${statusLabel[n.status] || n.status}]\n`;
      out += `   Path:     ${n.path}\n`;
      out += `   Selector: ${n.selector}\n`;
      if (n.note) out += `   Note:     ${n.note}\n`;
      out += '\n';
    });
    document.getElementById('export-text').textContent = out;
  }
  document.getElementById('export-modal').classList.add('open');
});

document.getElementById('export-copy').addEventListener('click', () => {
  const text = document.getElementById('export-text').textContent;
  navigator.clipboard.writeText(text).then(() => {
    document.getElementById('export-copy').textContent = '✅ Copied!';
    setTimeout(() => document.getElementById('export-copy').textContent = 'Copy to clipboard', 1500);
  });
});

document.getElementById('export-close-btn').addEventListener('click', () => {
  document.getElementById('export-modal').classList.remove('open');
});

/* ─── INIT ─── */
renderTabs();
renderCanvas();
</script>
</body>
</html>
